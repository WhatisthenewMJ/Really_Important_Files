<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Arcade Breakout: Score Edition</title>
    <style>
        body { background-color: #000; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        canvas { background-color: #111; border: 4px solid #333; box-shadow: 0 0 30px rgba(0, 255, 204, 0.2); }
    </style>
</head>
<body>

<canvas id="gameCanvas" width="600" height="800"></canvas>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    let score = 0;
    const paddleWidth = 120;
    const paddleHeight = 15;
    const ballRadius = 9;
    
    let paddleX = (canvas.width - paddleWidth) / 2;
    const paddleY = canvas.height - 50; // 패들의 Y축 위치 (고정)
    const paddleSpeed = 15;

    let x = canvas.width / 2;
    let y = paddleY - 20; // 시작 시 패들 바로 위에 공 배치
    let dx = 4;
    let dy = -4;

    let rightPressed = false;
    let leftPressed = false;

    // 벽돌 설정
    const brickRowCount = 8;
    const brickColumnCount = 8;
    const brickWidth = 68;
    const brickHeight = 25;
    const brickPadding = 5;
    const brickOffsetTop = 80;
    const brickOffsetLeft = 10;

    const brickConfigs = [
        { color: "#FF0000", points: 50 }, { color: "#FF0000", points: 50 },
        { color: "#FFFF00", points: 10 }, { color: "#FFFF00", points: 10 },
        { color: "#00FF00", points: 5 },  { color: "#00FF00", points: 5 },
        { color: "#0000FF", points: 1 },  { color: "#0000FF", points: 1 }
    ];

    const bricks = [];
    for (let r = 0; r < brickRowCount; r++) {
        bricks[r] = [];
        for (let c = 0; c < brickColumnCount; c++) {
            bricks[r][c] = { x: 0, y: 0, status: 1, ...brickConfigs[r] };
        }
    }

    document.addEventListener("keydown", (e) => {
        if (e.key === "Right" || e.key === "ArrowRight") rightPressed = true;
        else if (e.key === "Left" || e.key === "ArrowLeft") leftPressed = true;
    }, false);
    document.addEventListener("keyup", (e) => {
        if (e.key === "Right" || e.key === "ArrowRight") rightPressed = false;
        else if (e.key === "Left" || e.key === "ArrowLeft") leftPressed = false;
    }, false);

    function collisionDetection() {
        for (let r = 0; r < brickRowCount; r++) {
            for (let c = 0; c < brickColumnCount; c++) {
                let b = bricks[r][c];
                if (b.status === 1) {
                    if (x > b.x && x < b.x + brickWidth && y > b.y && y < b.y + brickHeight) {
                        dy = -dy;
                        b.status = 0;
                        score += b.points;
                        if (b.points === 50) { dx *= 1.01; dy *= 1.01; }
                        checkWin();
                    }
                }
            }
        }
    }

    function checkWin() {
        let activeBricks = 0;
        for(let r=0; r<brickRowCount; r++) {
            for(let c=0; c<brickColumnCount; c++) {
                if(bricks[r][c].status === 1) activeBricks++;
            }
        }
        if(activeBricks === 0) {
            alert("VICTORY! SCORE: " + score);
            document.location.reload();
        }
    }

    function drawBall() {
        ctx.beginPath();
        ctx.arc(x, y, ballRadius, 0, Math.PI * 2);
        ctx.fillStyle = "#FFFFFF";
        ctx.fill();
        ctx.closePath();
    }

    function drawPaddle() {
        ctx.beginPath();
        ctx.rect(paddleX, paddleY, paddleWidth, paddleHeight);
        ctx.fillStyle = "#00FFCC";
        ctx.fill();
        ctx.closePath();
    }

    function drawBricks() {
        for (let r = 0; r < brickRowCount; r++) {
            for (let c = 0; c < brickColumnCount; c++) {
                if (bricks[r][c].status === 1) {
                    let brickX = (c * (brickWidth + brickPadding)) + brickOffsetLeft;
                    let brickY = (r * (brickHeight + brickPadding)) + brickOffsetTop;
                    bricks[r][c].x = brickX;
                    bricks[r][c].y = brickY;
                    ctx.beginPath();
                    ctx.rect(brickX, brickY, brickWidth, brickHeight);
                    ctx.fillStyle = bricks[r][c].color;
                    ctx.fill();
                    ctx.closePath();
                }
            }
        }
    }

    function drawScore() {
        ctx.font = "bold 24px Consolas";
        ctx.fillStyle = "#FFFF00";
        ctx.textAlign = "center";
        ctx.fillText("SCORE: " + score, canvas.width / 2, 40);
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawBricks();
        drawBall();
        drawPaddle();
        drawScore();
        collisionDetection();

        // 좌우 벽 충돌
        if (x + dx > canvas.width - ballRadius || x + dx < ballRadius) {
            dx = -dx;
        }
        
        // 천장 충돌
        if (y + dy < 60 + ballRadius) {
            dy = -dy;
        } 

        // --- 패들 충돌 로직 (핵심 수정 부분) ---
        // 공의 아래쪽 끝이 패들의 윗면에 닿았는지 확인
        if (y + dy > paddleY - ballRadius && y + dy < paddleY + paddleHeight) {
            if (x > paddleX && x < paddleX + paddleWidth) {
                // 패들의 위치에 따라 튕기는 각도 조절
                let hitPos = (x - (paddleX + paddleWidth / 2)) / (paddleWidth / 2);
                dx = hitPos * 8; 
                dy = -Math.abs(dy); // 반드시 위로 튕기게 설정
                y = paddleY - ballRadius; // 공이 패들에 파묻히지 않게 위치 보정
            }
        }

        // 바닥 충돌 (게임 오버)
        if (y + dy > canvas.height) {
            alert("GAME OVER\nSCORE: " + score);
            document.location.reload();
            return;
        }

        // 패들 이동
        if (rightPressed && paddleX < canvas.width - paddleWidth) {
            paddleX += paddleSpeed;
        } else if (leftPressed && paddleX > 0) {
            paddleX -= paddleSpeed;
        }

        x += dx;
        y += dy;
        requestAnimationFrame(draw);
    }

    draw();
</script>

</body>
</html>
