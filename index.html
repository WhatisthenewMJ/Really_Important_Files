<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Arcade Breakout - Fixed Collision</title>
    <style>
        body { background: #000; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: sans-serif; }
        canvas { background: #111; border: 4px solid #444; }
    </style>
</head>
<body>

<canvas id="gameCanvas" width="600" height="800"></canvas>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    // 게임 변수
    let score = 0;
    const paddleWidth = 120;
    const paddleHeight = 20; // 패들을 약간 더 두껍게
    const ballRadius = 10;
    
    let paddleX = (canvas.width - paddleWidth) / 2;
    const paddleY = 730; // 바닥에서 충분히 띄움
    let paddleSpeed = 15;

    let x = canvas.width / 2;
    let y = 400; // 중간에서 시작
    let dx = 4;
    let dy = 5; // 아래로 떨어지면서 시작

    let rightPressed = false;
    let leftPressed = false;

    // 벽돌 설정
    const brickRows = 8;
    const brickCols = 8;
    const brickW = 68;
    const brickH = 25;
    const bricks = [];
    const colors = ["red", "red", "yellow", "yellow", "green", "green", "blue", "blue"];
    const points = [50, 50, 10, 10, 5, 5, 1, 1];

    for(let r=0; r<brickRows; r++) {
        bricks[r] = [];
        for(let c=0; c<brickCols; c++) {
            bricks[r][c] = { x: 0, y: 0, status: 1, color: colors[r], pt: points[r] };
        }
    }

    document.addEventListener("keydown", (e) => {
        if(e.key === "ArrowRight") rightPressed = true;
        if(e.key === "ArrowLeft") leftPressed = true;
    });
    document.addEventListener("keyup", (e) => {
        if(e.key === "ArrowRight") rightPressed = false;
        if(e.key === "ArrowLeft") leftPressed = false;
    });

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 1. 벽돌 그리기 및 충돌
        for(let r=0; r<brickRows; r++) {
            for(let c=0; c<brickCols; c++) {
                let b = bricks[r][c];
                if(b.status === 1) {
                    let bx = c * (brickW + 5) + 12;
                    let by = r * (brickH + 5) + 80;
                    b.x = bx; b.y = by;
                    ctx.fillStyle = b.color;
                    ctx.fillRect(bx, by, brickW, brickH);

                    // 벽돌 충돌
                    if(x > bx && x < bx + brickW && y > by && y < by + brickH) {
                        dy = -dy;
                        b.status = 0;
                        score += b.pt;
                        if(b.pt === 50) { dx *= 1.02; dy *= 1.02; }
                    }
                }
            }
        }

        // 2. 패들 그리기
        ctx.fillStyle = "#00FFCC";
        ctx.fillRect(paddleX, paddleY, paddleWidth, paddleHeight);

        // 3. 공 그리기
        ctx.beginPath();
        ctx.arc(x, y, ballRadius, 0, Math.PI*2);
        ctx.fillStyle = "white";
        ctx.fill();
        ctx.closePath();

        // 4. 점수 표시
        ctx.fillStyle = "yellow";
        ctx.font = "24px Arial";
        ctx.textAlign = "center";
        ctx.fillText("SCORE: " + score, canvas.width/2, 40);

        // --- 핵심: 패들 충돌 로직 (수정됨) ---
        // 공이 내려오는 중이고(dy > 0), 공의 바닥이 패들의 윗면보다 아래로 내려왔을 때
        if (dy > 0 && y + ballRadius >= paddleY && y - ballRadius <= paddleY + paddleHeight) {
            // 공의 x축이 패들 범위 안에 있다면
            if (x >= paddleX && x <= paddleX + paddleWidth) {
                dy = -Math.abs(dy); // 위로 튕김
                y = paddleY - ballRadius; // 공이 패들에 파묻히지 않게 위치 강제 조정

                // 패들의 맞은 위치에 따라 각도 변화
                let hitPoint = (x - (paddleX + paddleWidth/2)) / (paddleWidth/2);
                dx = hitPoint * 8; 
            }
        }

        // 5. 벽 충돌 (좌우/천장)
        if(x + dx > canvas.width - ballRadius || x + dx < ballRadius) dx = -dx;
        if(y + dy < 60) dy = -dy;

        // 6. 게임 오버 (패들보다 훨씬 아래로 내려갔을 때)
        if(y > canvas.height) {
            alert("GAME OVER! SCORE: " + score);
            document.location.reload();
            return;
        }

        // 7. 이동
        if(rightPressed && paddleX < canvas.width - paddleWidth) paddleX += paddleSpeed;
        if(leftPressed && paddleX > 0) paddleX -= paddleSpeed;

        x += dx;
        y += dy;

        requestAnimationFrame(draw);
    }

    draw();
</script>

</body>
</html>
